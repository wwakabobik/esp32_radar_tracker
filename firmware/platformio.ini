[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    olikraus/U8g2@^2.35.19
    iavorvel/MyLD2410@^1.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DMQTT_HOST=\"192.168.1.100\"
    -DMQTT_PORT=18830
    -DWIFI_SSID=\"YOUR_WIFI\"
    -DWIFI_PASS=\"YOUR_PASS\"
    -DHOSTNAME=\"presence-hub\"
