<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presence Hub</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Presence Hub</h1>
    <nav>
      <a href="/" class="active">Dashboard</a>
      <a href="/static/display.html">Display</a>
    </nav>
  </header>

  <main>
    <section class="cards">
      <div class="card">
        <h2>Status</h2>
        <p id="mode">Mode: -</p>
        <p id="online">Online: -</p>
        <p id="present">Present: -</p>
      </div>
      <div class="card">
        <h2>Today</h2>
        <p id="today">0h 00m</p>
        <p id="session">Session: 0m</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
